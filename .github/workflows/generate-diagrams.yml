# spell:ignore quotepath mmdc stefanzweifel
name: "Generate Diagrams"

on:
  pull_request:

env:
  MERMAID_CLI_VERSION: "11.12.0"
  MERMAID_CONFIG_PATH: ./docs/generated/mermaid-config.json
  PUPPETEER_CONFIG_PATH: ./docs/generated/puppeteer-config.json
  IMAGE_OUTPUT_DIR: ./docs/generated
  IMAGE_TYPE: png
  IMAGE_MAX_WIDTH: 100000
  IMAGE_MAX_HEIGHT: 100000

permissions: {}

jobs:
  changed_files:
    name: Check for changed diagrams
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2 # retrieve the preceding commit.

      - name: Get changed files
        id: changed_files
        uses: tj-actions/changed-files@v47
        with:
          output_renamed_files_as_deleted_and_added: true
          since_last_remote_commit: true
          json: true
          escape_json: false
          files: |
            **/*.mmd

      - name: |
          ${{ steps.changed_files.outputs.any_modified == 'true' && 'Changes detected 📝' || 'No changes ✅' }}
        run: |
          echo "${{ steps.changed_files.outputs.all_changed_files_count }} changed, ${{ steps.changed_files.outputs.deleted_files_count }} deleted files."

    outputs:
      any_modified: ${{ steps.changed_files.outputs.any_modified }}
      changed_files_json: ${{ steps.changed_files.outputs.all_changed_files }}
      deleted_files_json: ${{ steps.changed_files.outputs.deleted_files }}

  generate-diagrams:
    name: Generate diagrams
    needs: changed_files
    if: needs.changed_files.outputs.any_modified == 'true'
    runs-on: ubuntu-latest
    permissions:
      # Note: This job will fail if the PR is from a forked repository. We'll need to identify a better
      # way to handle forks should the need ever arise. A `pull_request_target` trigger may be a solution.
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install mermaid-cli
        run: npm install -g "@mermaid-js/mermaid-cli@$MERMAID_CLI_VERSION"

      - name: Install Google Fonts (Recursive)
        uses: jim60105/action-install-google-fonts@v2
        with:
          fonts: Recursive

      - name: Generate diagram images
        env:
          CHANGED_FILES_JSON: ${{ needs.changed_files.outputs.changed_files_json }}
        shell: pwsh
        run: |
          "$env:CHANGED_FILES_JSON" | ConvertFrom-Json | ForEach-Object -Parallel {
              $file = Get-Item $_
              $imagePath = Join-Path $env:IMAGE_OUTPUT_DIR ([System.IO.Path]::ChangeExtension($file.Name, $env:IMAGE_TYPE))
              Write-Host "Processing: '$file' -> '$imagePath'"

              mmdc `
                  --input $file `
                  --output $imagePath `
                  --width $env:IMAGE_MAX_WIDTH --height $env:IMAGE_MAX_HEIGHT `
                  --configFile $env:MERMAID_CONFIG_PATH `
                  --puppeteerConfigFile $env:PUPPETEER_CONFIG_PATH
          }

      - name: Delete orphaned diagram images
        env:
          DELETED_FILES_JSON: ${{ needs.changed_files.outputs.deleted_files_json }}
        shell: pwsh
        run: |
          "$env:DELETED_FILES_JSON" | ConvertFrom-Json | ForEach-Object {
              $fileName = Split-Path $_ -Leaf
              $imagePath = Join-Path $env:IMAGE_OUTPUT_DIR ([System.IO.Path]::ChangeExtension($fileName, $env:IMAGE_TYPE))
              if (Test-Path $imagePath) {
                  Write-Host "Pruning orphaned diagram image: '$imagePath'"
                  Remove-Item $imagePath
              }
          }

      - name: Atomic commit
        id: auto_commit_action
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          file_pattern: "${{ env.IMAGE_OUTPUT_DIR }}/*"
          commit_message: "docs(diagrams): automatically generated diagram images"

      - name: "${{ steps.auto_commit_action.outputs.changes_detected == 'true' &&
          'Changes pushed ⚡' || 'No changes ✅' }}"
        if: steps.auto_commit_action.outputs.changes_detected == 'true'
        run: |
          echo "Commit ID: ${{ steps.auto_commit_action.outputs.commit_hash }}"
