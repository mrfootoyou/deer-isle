# This workflow automatically generates diagram images from Mermaid files.
name: autofix.ci # must be named "autofix.ci" to work with the autofix-ci action

on:
  pull_request:
  workflow_dispatch:
    inputs:
      # checkov:skip=CKV_GHA_7: Diagram input is validated to be file paths within the repository.
      diagrams:
        description: |
          Comma-separated list of diagram files to process (supports glob patterns)
        required: true
        default: "**/*.mmd"

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}

jobs:
  autofix:
    # job name must be "autofix" to work with the autofix-ci action
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      # Default values. Will be overridden below.
      ANY_CHANGED: false
      CHANGED_FILES_JSON: ""
      ANY_DELETED: false
      DELETED_FILES_JSON: ""
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # Note: The Mermaid CLI image generator is not deterministic -- it produces slightly different
      # PNG and SVG images even when the source diagram is unchanged. Therefore, we must check for
      # source diagram changes in order to avoid unnecessary commits.

      - name: Get changed files (manual trigger)
        if: github.event_name == 'workflow_dispatch'
        shell: pwsh
        env:
          INPUT_DIAGRAMS: ${{ github.event.inputs.diagrams }}
        run: |
          # For manual triggers, we need to resolve the input glob patterns to actual
          # file paths. We ignore any paths that are outside the repository.
          $changedFiles = (
              "$env:INPUT_DIAGRAMS".Split(',') |
              ForEach-Object { $_.Trim() -replace '^\*\*/','' } |
              ForEach-Object { if ($_) { git ls-files "$_" } } |
              Select-Object -Unique
          )
          echo "ANY_CHANGED=$($changedFiles.Count -gt 0)" >> $GITHUB_ENV
          echo "CHANGED_FILES_JSON=$($changedFiles | ConvertTo-Json -Compress -AsArray)" >> $GITHUB_ENV

      - name: Get changed files (event trigger)
        id: changed_files
        if: github.event_name != 'workflow_dispatch'
        uses: tj-actions/changed-files@v47
        with:
          since_last_remote_commit: true
          output_renamed_files_as_deleted_and_added: true
          json: true
          escape_json: false
          files: |
            **/*.mmd

      - name: Set environment variables
        if: steps.changed_files.outcome == 'success'
        env:
          ANY_CHANGED: ${{ steps.changed_files.outputs.any_changed == 'true' }}
          CHANGED_FILES_JSON: ${{ steps.changed_files.outputs.all_changed_files }}
          ANY_DELETED: ${{ steps.changed_files.outputs.any_deleted == 'true' }}
          DELETED_FILES_JSON: ${{ steps.changed_files.outputs.deleted_files }}
        run: |
          echo "ANY_CHANGED=$ANY_CHANGED" >> $GITHUB_ENV
          echo "CHANGED_FILES_JSON=$CHANGED_FILES_JSON" >> $GITHUB_ENV
          echo "ANY_DELETED=$ANY_DELETED" >> $GITHUB_ENV
          echo "DELETED_FILES_JSON=$DELETED_FILES_JSON" >> $GITHUB_ENV

      # Setup Node for SVGO (used in the build script)
      - name: Setup Node.js
        if: env.ANY_CHANGED == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Generate diagram images
        if: env.ANY_CHANGED == 'true'
        shell: pwsh
        run: |
          $diagrams = "$env:CHANGED_FILES_JSON" | ConvertFrom-Json
          ./build.ps1 build -- -Diagrams $diagrams

      - name: Delete orphaned diagram images
        if: env.ANY_DELETED == 'true'
        shell: pwsh
        run: |
          "$env:DELETED_FILES_JSON" | ConvertFrom-Json | ForEach-Object {
              $fileName = Split-Path $_ -Leaf
              foreach ($ext in @('png', 'svg')) {
                  $imagePath = Join-Path './docs/generated' ([System.IO.Path]::ChangeExtension($fileName, $ext))
                  if (Test-Path $imagePath) {
                      Write-Host "Deleting orphaned diagram image: '$imagePath'"
                      Remove-Item $imagePath
                  }
              }
          }

      - name: Commit changes using autofix.ci
        if: env.ANY_CHANGED == 'true' || env.ANY_DELETED == 'true'
        uses: autofix-ci/action@v1
        with:
          commit-message: "docs(diagram): automatically generated diagram images"
          comment: Automated update of diagram images based on changes to .mmd files.
